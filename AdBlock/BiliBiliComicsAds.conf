// ==UserScript==
// @ScriptName        哔哩哔哩漫画净化[墨鱼版]
// @Author            @ddgksf2013
// @Function          如果有需要的去除广告的APP，可自行在共享表格中添加需求
// @AddRequest        https://bit.ly/addRequestforAdBlock
// @WechatID          墨鱼手记
// @TgChannel         https://t.me/ddgksf2021
// @Contribute        https://t.me/ddgksf2013_bot
// @UpdateTime        2026-06-14
// @Suitable          自行观看“# > ”注释内容
// @Attention         使用前请卸载高德地图，挂载脚本然后使用
// @Attention         如需引用请注明出处，谢谢合作！
// @Version           V1.0.6
// @ScriptURL         https://raw.githubusercontent.com/ddgksf2013/Rewrite/refs/heads/master/AdBlock/BiliBiliComicsAds.conf
// ==/UserScript==


hostname = manga.bilibili.com
  
# ===== 哔哩哔哩漫画净化 =====

# 开屏 / 活动弹窗
^https:\/\/manga\.bilibili\.com\/twirp\/comic\.v\d\.Comic\/ListFlash url jsonjq-response-body '.data.list=[] | .data.ad_list=[] | .data.show=[] | .data.verifying_list=[] | .data.ad_loc=false'

# 首页轮播 Banner
^https:\/\/manga\.bilibili\.com\/twirp\/comic\.v\d\.Comic\/Banner url jsonjq-response-body '.data=[]'

# App 初始化里的开屏、运营位、商城入口、活动入口
^https:\/\/manga\.bilibili\.com\/twirp\/comic\.v\d\.Comic\/AppInit url jsonjq-response-body '.data.flash={"id":0,"title":"","img":"","jump_type":0,"jump_value":"","offline_time":"","meta_type":0,"video":"","online_time":"","button":"","video_hash":"","button_type":0,"click_type":0,"show_limit":0,"txt_type":0,"back_img":"","flow_id":""} | .data.operate={"id":0,"title":"","img":"","jump_url":"","gift_type":0,"gift_comic_id":0,"gift_url":"","has_taken_gift":false,"jump_type":0,"img_type":0,"md5":"","play_mode":0} | .data.user_center_operate=null | .data.activity_tab=null | .data.bubble=null | .data.card_banner_in_pay=null | .data.card_banner_in_ctrl={"id":0,"img_url":""} | .data.card_banner_in_coupon=null | .data.fission={"enable_entry":false,"title":"","subtitle":"","url":""} | .data.shop_entry=false | .data.shop_entry_txt="" | .data.shop_entry_icon="" | .data.game_entry=false | .data.game_entry_txt="" | .data.game_entry_desc="" | .data.game_entry_url="" | .data.game_entry_icon="" | .data.act_entry_txt="" | .data.act_entry_txt_type=0 | .data.unread_message_count=0'

# 首页 Tab 精简：去掉活动 Tab、商城入口
^https:\/\/manga\.bilibili\.com\/twirp\/comic\.v\d\.Comic\/GetClassPageAllTabs url jsonjq-response-body '.data.home_type |= map(select(.name!="初夏纯爱！" and .name!="妖气村")) | .data.home_feed |= map(select(.name!="商城"))'

# 首页推荐：只去运营卡片 type=42
^https:\/\/manga\.bilibili\.com\/twirp\/comic\.v\d\.Home\/HomeFeed url jsonjq-response-body '.data.feeds |= map(select(.type!=42)) | .data.banner.image="" | .data.banner.jump_url="" | .data.banner.text="" | .data.banner.remain_sign_days=0'

# 活动 Tab
^https:\/\/manga\.bilibili\.com\/twirp\/comic\.v\d\.Comic\/GetActivityTab url jsonjq-response-body '.data.name="" | .data.img="" | .data.url="" | .data.gif="" | .data.cycle_num=0 | .data.bubble_txt="" | .data.id=0'

# 气泡
^https:\/\/manga\.bilibili\.com\/twirp\/comic\.v\d\.Comic\/GetBubbles url jsonjq-response-body '.data.bubbles=[] | .data.rule=null'

# 福利横幅
^https:\/\/manga\.bilibili\.com\/twirp\/comic\.v\d\.Comic\/GetWelfareBanner url jsonjq-response-body '.data.type=0 | .data.title="" | .data.sub_title="" | .data.content="" | .data.jump_url=""'

# 运营横幅
^https:\/\/manga\.bilibili\.com\/twirp\/comic\.v\d\.Comic\/GetOperaterBanner url jsonjq-response-body '.data.operate={"id":0,"title":"","img":"","jump_url":"","gift_type":0,"gift_comic_id":0,"gift_url":"","has_taken_gift":false,"jump_type":0,"img_type":0,"md5":"","play_mode":0}'

# 通用横幅 / 畅读卡营销横幅
^https:\/\/manga\.bilibili\.com\/twirp\/comic\.v\d\.Comic\/GetCommonBanner url jsonjq-response-body '.data.id=0 | .data.title="" | .data.content="" | .data.jump_url="" | .data.jump_type=0 | .data.background="" | .data.image_url="" | .data.comic_id=0 | .data.icon="" | .data.type=0 | .data.column=null | .data.limit_scope=0 | .data.btn_txt="" | .data.img_type=0 | .data.play_mode=0 | .data.color_type=0 | .data.sub_background="" | .data.relate_second_page=false | .data.active_time="" | .data.offline_time="" | .data.create_time="" | .data.status=0 | .data.banner_ext=null | .data.bubble_text="" | .data.calendar_ext=null'

# Hook Banner
^https:\/\/manga\.bilibili\.com\/twirp\/comic\.v\d\.Comic\/GetHookBanner url jsonjq-response-body '.data.id=0 | .data.title="" | .data.jump_url="" | .data.image_url=""'

# 我的页营销入口，只保留“我的已购”
^https:\/\/manga\.bilibili\.com\/twirp\/user\.v\d\.User\/UCenterConf url jsonjq-response-body '.data.confs |= map(select(.title=="我的已购")) | .data.show_welfare=false | .data.show_all_welfare=false'

# 营销中心入口 / 弹窗
^https:\/\/manga\.bilibili\.com\/twirp\/user\.v\d\.User\/GetMarketingCenterInfo url jsonjq-response-body '.data.show_entry=false | .data.entry.image="" | .data.entry.url="" | .data.entry.entry_id="0" | .data.show_popup=false | .data.popup.image="" | .data.popup.url="" | .data.popup.activity_id="0" | .data.popup.entry_id="0"'

# 搜索框填词
^https:\/\/manga\.bilibili\.com\/twirp\/search\.v\d\.Search\/GetSearchBoxKeyword url jsonjq-response-body '.data.keywords=[]'

# 搜索页展示
^https:\/\/manga\.bilibili\.com\/twirp\/comic\.v\d\.Comic\/SearchDisplay url jsonjq-response-body '.data.list=[]'

# 搜索页 Banner
^https:\/\/manga\.bilibili\.com\/twirp\/comic\.v\d\.Comic\/SearchBanner url jsonjq-response-body '.data.banners=[]'

# 搜索页猜你喜欢标签
^https:\/\/manga\.bilibili\.com\/twirp\/search\.v\d\.Search\/GetGuessLabel url jsonjq-response-body '.data.labels=[]'

# 热搜
^https:\/\/manga\.bilibili\.com\/twirp\/search\.v\d\.Search\/GetHotSearch url jsonjq-response-body '.data.comics=[]'

# 红点
^https:\/\/manga\.bilibili\.com\/twirp\/line\.v\d\.Line\/TabRedDot url jsonjq-response-body '.data.has_red_dot=false'

# 推荐
^https:\/\/manga\.bilibili\.com\/twirp\/comic\.v\d\.Comic\/Recommend url jsonjq-response-body '.data=[]'

